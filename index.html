<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tools Recommendation Engine | Find the Best AI Tools</title>
    <meta name="description" content="A curated engine to help you find the most relevant and trending AI tools in 2026 based on your requirements.">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Tools Finder</h1>
            <p class="subtitle">Experience the next generation of AI tool discovery. Curated, trending, and tailored to your needs.</p>
        </header>

        <main class="search-wrapper">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="e.g., 'AI video editing' or 'Coding assistant'..." autofocus>
                <button id="search-btn">Search</button>
            </div>
        </main>

        <section id="results-section">
            <!-- Results will be injected here by app.js -->
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
